<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse | Cognitive Synthesizer</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent-blue: #00f2ff;
            --accent-red: #ff0055;
            --synthesis: #bc13fe;
            --text: #e0e0e0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        .canvas {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            gap: 20px;
        }
        textarea {
            width: 45%;
            height: 150px;
            background: #1a1a1f;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent-blue); }
        button {
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(45deg, var(--accent-blue), var(--synthesis));
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }
        #output {
            margin-top: 40px;
            padding: 25px;
            border: 2px solid var(--synthesis);
            border-radius: 15px;
            display: none;
            background: rgba(188, 19, 254, 0.05);
            animation: fadeIn 1s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>SYNAPSE <span style="font-weight: 200;">v1.0</span></h1>
    <p>Input two conflicting ideas to generate the <strong>"Third Way"</strong>.</p>

    <div class="canvas">
        <textarea id="idea1" placeholder="Person A's Idea (e.g., We need a bright, loud marketing campaign)"></textarea>
        <textarea id="idea2" placeholder="Person B's Idea (e.g., We need a minimal, quiet luxury feel)"></textarea>
    </div>

    <button onclick="synthesize()">RUN SYNTHESIS</button>

    <div id="output">
        <h3 style="color: var(--synthesis);">THE THIRD WAY (Synthesized)</h3>
        <p id="resultText"></p>
    </div>
</div>

<script>
    function synthesize() {
        const i1 = document.getElementById('idea1').value;
        const i2 = document.getElementById('idea2').value;
        const output = document.getElementById('output');
        const result = document.getElementById('resultText');

        if(i1 === "" || i2 === "") {
            alert("Please enter both ideas!");
            return;
        }

        // Simulating the "A to Z" Logic
        // In the real app, this calls a neural API. 
        // Here, it uses a logic-merge pattern.
        
        output.style.display = "block";
        result.innerHTML = "<b>Synthesizing Logic...</b><br>Analyzing visual drift and core values...<br><br>" + 
        "<b>Proposed Solution:</b> Introduce a 'Kinetic Minimalism' approach. Use the minimal aesthetic from Person B, but apply Person A's high-energy motion graphics. This satisfies the need for impact without the visual clutter.";
    }
</script>

</body>
</html>
