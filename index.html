<script>
    function synthesize() {
        const i1 = document.getElementById('idea1').value;
        const i2 = document.getElementById('idea2').value;
        const output = document.getElementById('output');
        const result = document.getElementById('resultText');

        if(i1 === "" || i2 === "") {
            alert("Please enter both ideas!");
            return;
        }

        output.style.display = "block";
        result.innerHTML = "<b>Synthesizing Logic...</b><br>Mapping core intent...";

        // DYNAMIC LOGIC: It pulls words from the user's input
        setTimeout(() => {
            const wordA = i1.split(' ').slice(-1)[0]; // Grabs a key word from Idea A
            const wordB = i2.split(' ').slice(-1)[0]; // Grabs a key word from Idea B
            
            result.innerHTML = `
                <b>ANALYSIS COMPLETE:</b><br>
                We have identified a conflict between the need for <b>"${i1}"</b> and <b>"${i2}"</b>.<br><br>
                <b>THE THIRD WAY:</b><br>
                Implement a <b>"Phased Fusion"</b> strategy. Start with the core structure of <i>${wordA}</i> to establish stability, then integrate the <i>${wordB}</i> elements in the second sprint. This allows both stakeholders to see their vision realized without compromising the launch date.
            `;
        }, 1200);
    }
</script>
